<!DOCTYPE html>
{% load static %}
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEll-track - Вхід до системи">
    <title>WEll-track - Вхід</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-gradient">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="auth-container">
            <!-- Back Button -->
            <a href="{% url 'home' %}" class="back-button mb-4">
                <i class="bi bi-arrow-left"></i>
                <span>Назад</span>
            </a>

            <!-- Logo and Title -->
            <div class="text-center mb-4">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <div class="logo-icon-small">
                        <span>W</span>
                    </div>
                    <h1 class="brand-title-small mb-0">WEll-track</h1>
                </div>
                <h2 class="auth-title mb-2">Вхід до системи</h2>
                <p class="auth-subtitle">Введіть свої дані для входу</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <!-- Email Field -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password Link -->
                <div class="text-end mb-3">
                    <a href="#" class="forgot-link">Забули пароль?</a>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

                <!-- Submit Button -->
                <a href="{% url 'dashboard_page' %}" class="btn btn-primary w-100 btn-gradient mb-3">
                    Увійти
                </a>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="mb-0">
                        Ще не маєте акаунту?
                        <a href="{% url 'select_type_page' %}" class="auth-link">Зареєструватись</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
