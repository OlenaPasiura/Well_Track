<!DOCTYPE html>
{% load static %}
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEll-track - We track your health. You take care of it.">
    <title>WEll-track - Головна</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-gradient">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="welcome-container">

            <!-- Logo and Branding -->
            <div class="text-center mb-5">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <div class="logo-icon">
                        <span>W</span>
                    </div>
                </div>
                <h1 class="brand-title mb-3">WEll-track</h1>
                <p class="brand-subtitle">We track your health. You take care of it.</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/login/" class="action-card login-card">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="d-flex align-items-center justify-between w-100">
                            <div class="d-flex align-items-center gap-3">
                                <div class="action-icon login-icon">
                                    <i class="bi bi-box-arrow-in-right"></i>
                                </div>
                                <div class="text-start">
                                    <h3 class="action-title mb-1">Увійти</h3>
                                    <p class="action-subtitle mb-0">Вже маєте акаунт</p>
                                </div>
                            </div>
                            <div class="arrow">→</div>
                        </div>
                    </div>
                </a>

                <a href="/select-type/" class="action-card register-card">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="d-flex align-items-center justify-between w-100">
                            <div class="d-flex align-items-center gap-3">
                                <div class="action-icon register-icon">
                                    <i class="bi bi-person-plus"></i>
                                </div>
                                <div class="text-start">
                                    <h3 class="action-title mb-1">Зареєструватись</h3>
                                    <p class="action-subtitle mb-0">Створити новий акаунт</p>
                                </div>
                            </div>
                            <div class="arrow">→</div>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Footer -->
            <div class="text-center mt-5">
                <p class="footer-text">Почніть відстежувати своє здоров'я сьогодні</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
