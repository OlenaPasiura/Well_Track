<!DOCTYPE html>
{% load static %}
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEll-track - Відстеження рівня стресу">
    <title>WEll-track - Рівень стресу</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .emoji-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .emoji-btn {
            width: 5rem;
            height: 5rem;
            font-size: 3rem;
            border: 3px solid transparent;
            border-radius: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }
        .emoji-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .emoji-btn.selected {
            border-color: var(--primary-purple);
            background: linear-gradient(135deg, #faf5ff 0%, #eff6ff 100%);
            transform: scale(1.1);
        }
        .emoji-label {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }
        .history-item {
            background: white;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="dashboard-body">
    <!-- Navigation (same as dashboard) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard_page' %}">
                <div class="logo-icon-nav">
                    <span>W</span>
                </div>
                <span class="brand-title-nav">WEll-track</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard_page' %}">
                            <i class="bi bi-house-door"></i> Головна
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'stress_page' %}">
                            <i class="bi bi-emoji-smile"></i> Стрес
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'sleep_page' %}">
                            <i class="bi bi-moon-stars"></i> Сон
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'nutrition_page' %}">
                            <i class="bi bi-cup-straw"></i> Харчування
                        </a>
                    </li>
                    <li class="nav-item" id="chatNavItem">
                        <a class="nav-link" href="{% url 'chat_page' %}">
                            <i class="bi bi-chat-dots"></i> Чат
                        </a>
                    </li>
                    <li class="nav-item d-none" id="responsesNavItem">
                        <a class="nav-link" href="{% url 'responses_page' %}">
                            <i class="bi bi-chat-square-text"></i> Відповіді
                        </a>
                    </li>
                    <li class="nav-item">
                        <!-- поки просто веде на головну; реальний logout зробимо пізніше -->
                        <a class="nav-link" href="{% url 'home' %}" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Вийти
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <h1 class="page-title mb-4">Рівень стресу</h1>

        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="chart-card">
                    <h5 class="chart-title">Як ви себе відчуваєте сьогодні?</h5>

                    <div class="emoji-selector">
                        <button class="emoji-btn" data-level="1">
                            😊
                            <span class="emoji-label">Відмінно</span>
                        </button>
                        <button class="emoji-btn" data-level="2">
                            🙂
                            <span class="emoji-label">Добре</span>
                        </button>
                        <button class="emoji-btn" data-level="3">
                            😐
                            <span class="emoji-label">Нормально</span>
                        </button>
                        <button class="emoji-btn" data-level="4">
                            😟
                            <span class="emoji-label">Стресово</span>
                        </button>
                        <button class="emoji-btn" data-level="5">
                            😰
                            <span class="emoji-label">Дуже стресово</span>
                        </button>
                    </div>

                    <div class="mb-3">
                        <label for="note" class="form-label">Нотатка (необов'язково)</label>
                        <textarea class="form-control" id="note" rows="3" placeholder="Опишіть що спричинило такий стан..."></textarea>
                    </div>

                    <button id="saveBtn" class="btn btn-primary btn-gradient w-100">
                        Зберегти
                    </button>
                </div>

                <div class="chart-card mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="chart-title mb-0">Статистика стресу</h5>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-sm btn-outline-primary active" id="weekBtn" onclick="switchPeriod('week')">
                                Тиждень
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-primary" id="monthBtn" onclick="switchPeriod('month')">
                                Місяць
                            </button>
                        </div>
                    </div>
                    <canvas id="stressChart"></canvas>
                </div>

                <div class="chart-card mt-4">
                    <h5 class="chart-title">Історія записів</h5>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>

        <!-- AI Assistant Button -->
        <button class="ai-assistant-btn" id="aiAssistantBtn" title="AI Помічник">
            <i class="bi bi-robot"></i>
        </button>
    </div>

    <!-- AI Assistant Modal -->
    <div class="modal fade" id="aiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-robot"></i> AI Помічник
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="aiChatBody">
                    <div class="ai-message">
                        <strong>AI:</strong> Привіт! Я ваш AI помічник. Чим можу допомогти?
                    </div>
                </div>
                <div class="modal-footer">
                    <input type="text" class="form-control" id="aiInput" placeholder="Введіть повідомлення...">
                    <button type="button" class="btn btn-primary" id="aiSendBtn">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
    <!-- цей inline JS залишив як було (для локальних даних / демо) -->
    <script>
        protectPage();

        let selectedLevel = null;
        let stressChart = null;
        let currentPeriod = 'week';

        // Handle emoji selection
        const emojiButtons = document.querySelectorAll('.emoji-btn');
        emojiButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                emojiButtons.forEach(function(b) { b.classList.remove('selected'); });
                this.classList.add('selected');
                selectedLevel = parseInt(this.getAttribute('data-level'));
            });
        });

        // Handle save
        document.getElementById('saveBtn').addEventListener('click', function() {
            if (!selectedLevel) {
                alert('Оберіть емоцію');
                return;
            }

            const note = document.getElementById('note').value;
            const today = getTodayString();

            const stressData = getData(STORAGE_KEYS.STRESS_DATA, []);
            const existingIndex = stressData.findIndex(function(item) { return item.date === today; });

            const entry = {
                date: today,
                level: selectedLevel,
                note: note,
                timestamp: new Date().toISOString()
            };

            if (existingIndex >= 0) {
                stressData[existingIndex] = entry;
            } else {
                stressData.push(entry);
            }

            saveData(STORAGE_KEYS.STRESS_DATA, stressData);
            alert('Збережено!');
            loadHistory();
            updateChart();
        });

        // Load history
        function loadHistory() {
            const stressData = getData(STORAGE_KEYS.STRESS_DATA, []);
            const historyList = document.getElementById('historyList');

            if (stressData.length === 0) {
                historyList.innerHTML = '<p class="text-muted">Поки що немає записів</p>';
                return;
            }

            stressData.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

            historyList.innerHTML = stressData.slice(0, 10).map(function(item) {
                const emojis = ['😊', '🙂', '😐', '😟', '😰'];
                return '<div class="history-item">' +
                    '<div class="d-flex justify-content-between align-items-center">' +
                    '<div><span style="font-size: 2rem;">' + emojis[item.level - 1] + '</span></div>' +
                    '<div class="text-end"><strong>' + formatDate(item.date) + '</strong></div>' +
                    '</div>' +
                    (item.note ? '<p class="mb-0 mt-2">' + item.note + '</p>' : '') +
                    '</div>';
            }).join('');
        }

        // Switch period
        function switchPeriod(period) {
            currentPeriod = period;
            document.getElementById('weekBtn').classList.toggle('active', period === 'week');
            document.getElementById('monthBtn').classList.toggle('active', period === 'month');
            updateChart();
        }

        // Update chart
        function updateChart() {
            const ctx = document.getElementById('stressChart');
            if (!ctx) return;

            const stressData = getData(STORAGE_KEYS.STRESS_DATA, []);
            const days = currentPeriod === 'week' ? 7 : 30;

            const labels = [];
            const data = [];
            const today = new Date();

            for (let i = days - 1; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];

                if (currentPeriod === 'week') {
                    labels.push(formatDate(dateStr));
                } else {
                    labels.push(date.getDate() + '.' + (date.getMonth() + 1));
                }

                const dayData = stressData.find(function(item) { return item.date === dateStr; });
                data.push(dayData ? dayData.level : null);
            }

            if (stressChart) {
                stressChart.destroy();
            }

            stressChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Рівень стресу',
                        data: data,
                        borderColor: 'rgb(239, 68, 68)',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        tension: 0.4,
                        fill: true,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 5,
                            ticks: {
                                stepSize: 1,
                                callback: function(value) {
                                    const labels = ['', '😊', '🙂', '😐', '😟', '😰'];
                                    return labels[value] || '';
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const labels = ['Дуже низький', 'Низький', 'Середній', 'Високий', 'Дуже високий'];
                                    return context.parsed.y ? labels[context.parsed.y - 1] : 'Немає даних';
                                }
                            }
                        }
                    }
                }
            });
        }

        loadHistory();
        updateChart();
    </script>
</body>
</html>
