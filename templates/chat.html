<!DOCTYPE html>
{% load static %}
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEll-track - Чат з дієтологом">
    <title>WEll-track - Чат</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .chat-container { max-width: 800px; margin: 0 auto; }
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .message { margin-bottom: 1rem; display: flex; flex-direction: column; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-bubble { max-width: 70%; padding: 0.75rem 1rem; border-radius: 1rem; word-wrap: break-word; }
        .message.sent .message-bubble { background: linear-gradient(90deg, #9333ea 0%, #3b82f6 100%); color: white; }
        .message.received .message-bubble { background: #f3f4f6; color: #1f2937; }
        .message-time { font-size: 0.75rem; color: #9ca3af; margin-top: 0.25rem; }
    </style>
</head>

<body class="dashboard-body">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard_page' %}">
                <div class="logo-icon-nav"><span>W</span></div>
                <span class="brand-title-nav">WEll-track</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard_page' %}">
                            <i class="bi bi-house-door"></i> Головна
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'stress_page' %}">
                            <i class="bi bi-emoji-smile"></i> Стрес
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'sleep_page' %}">
                            <i class="bi bi-moon-stars"></i> Сон
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'nutrition_page' %}">
                            <i class="bi bi-cup-straw"></i> Харчування
                        </a>
                    </li>

                    <li class="nav-item" id="chatNavItem">
                        <a class="nav-link active" href="{% url 'chat_page' %}">
                            <i class="bi bi-chat-dots"></i> Чат
                        </a>
                    </li>
                    <li class="nav-item d-none" id="responsesNavItem">
                        <a class="nav-link" href="{% url 'responses_page' %}">
                            <i class="bi bi-chat-square-text"></i> Відповіді
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Вийти
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <h1 class="page-title mb-4">Чат з дієтологом</h1>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>

            <div class="input-group">
                <input type="text" class="form-control" id="messageInput" placeholder="Введіть повідомлення...">
                <button class="btn btn-primary btn-gradient" id="sendBtn">
                    <i class="bi bi-send"></i> Відправити
                </button>
            </div>
        </div>

        <!-- AI Assistant Button -->
        <button class="ai-assistant-btn" id="aiAssistantBtn" title="AI Помічник">
            <i class="bi bi-robot"></i>
        </button>
    </div>

    <!-- AI Assistant Modal -->
    <div class="modal fade" id="aiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-robot"></i> AI Помічник
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="aiChatBody">
                    <div class="ai-message">
                        <strong>AI:</strong> Привіт! Я ваш AI помічник. Чим можу допомогти?
                    </div>
                </div>
                <div class="modal-footer">
                    <input type="text" class="form-control" id="aiInput" placeholder="Введіть повідомлення...">
                    <button type="button" class="btn btn-primary" id="aiSendBtn">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS (важливо: main.js перший) -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
